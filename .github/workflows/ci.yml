name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Backend: lint, type-check, migrations, pytest with 80% coverage gate
  # ──────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        options: >-
          --health-cmd "pg_isready -U test_user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[test,dev]"

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Format check
        run: ruff format --check src tests

      - name: Type-check (mypy)
        run: mypy src --ignore-missing-imports

      - name: Run Alembic migrations
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5432/test_db
        run: alembic upgrade head

      - name: Run tests with coverage gate
        # NOTE: the *_KEY / *_SECRET / *_PASSWORD values below are throwaway,
        # non-sensitive CI-only fixtures against an ephemeral service-container
        # database — NOT real secrets. They are intentionally inline (not
        # GitHub Actions secrets) so CI runs on pull requests from forks, which
        # cannot access repository secrets. Do not put production credentials here.
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret-key-32-bytes-xxxx
          JWT_SECRET: ci-jwt-secret-key-at-least-32-bytes
          FERNET_KEY: Y3VycmVudGtleW11c3RiZTMyYnl0ZXNsb25n
          ENVIRONMENT: test
          RATE_LIMIT_LOGIN: "5/minute"
          RUN_INTEGRATION_TESTS: "1"
        run: pytest --cov=src --cov-fail-under=80 -x

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          flags: backend

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.xml

  # ──────────────────────────────────────────────────────────────────────────
  # Frontend: lint, type-check, unit tests
  # ──────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      # pnpm/action-setup MUST run before setup-node so setup-node can find
      # pnpm to resolve the dependency cache. The pnpm version is read from
      # frontend/package.json's "packageManager" field — there is no root
      # package.json, so package_json_file must point at the frontend one.
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: frontend/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm lint

      - name: Type-check (tsc)
        run: pnpm exec tsc --noEmit

      - name: Unit tests (Vitest)
        run: pnpm test:unit -- --coverage --reporter=verbose

  # ──────────────────────────────────────────────────────────────────────────
  # Docker Compose: smoke test all 9 services start cleanly
  # ──────────────────────────────────────────────────────────────────────────
  compose-smoke:
    name: Docker Compose Smoke
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v4

      - name: Copy test env file
        run: cp .env.example .env

      - name: Build and start services
        run: docker compose up -d --build --wait
        timeout-minutes: 10

      - name: Check all 9 services healthy
        run: |
          services=(frontend backend worker beat db redis minio langfuse langfuse-db)
          for svc in "${services[@]}"; do
            STATUS=$(docker compose ps --format json | jq -r ".[] | select(.Service==\"$svc\") | .Health")
            echo "$svc: $STATUS"
            if [[ "$STATUS" != "healthy" && "$STATUS" != "running" ]]; then
              echo "ERROR: $svc is not healthy"
              docker compose logs $svc | tail -30
              exit 1
            fi
          done

      - name: Backend API health probe
        run: |
          for i in {1..10}; do
            STATUS=$(curl -sS -o /dev/null -w "%{http_code}" http://localhost:8000/api/v1/health)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            sleep 3
          done
          echo "Health check failed after 10 attempts"
          exit 1

      - name: Teardown
        if: always()
        run: docker compose down -v

  # ──────────────────────────────────────────────────────────────────────────
  # Spec compliance check
  # ──────────────────────────────────────────────────────────────────────────
  spec-compliance:
    name: Spec Compliance Check
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run compliance check
        run: python scripts/spec_compliance_check.py --output SPEC_COMPLIANCE_REPORT.md

      - name: Upload compliance report
        uses: actions/upload-artifact@v4
        with:
          name: spec-compliance-report
          path: SPEC_COMPLIANCE_REPORT.md
