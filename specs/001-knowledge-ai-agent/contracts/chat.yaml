openapi: "3.1.0"
info:
  title: "Internal Knowledge AI Agent — Chat API"
  version: "1.0.0"
  description: "Chat session and SSE streaming message endpoints."

servers:
  - url: /api/v1

security:
  - bearerAuth: []

paths:
  /chat/sessions:
    get:
      operationId: listChatSessions
      summary: List authenticated user's chat sessions
      tags: [chat]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionList"

    post:
      operationId: createChatSession
      summary: Create a new chat session
      tags: [chat]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  nullable: true
                  description: "Optional title; auto-generated from first message if omitted"
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"

  /chat/sessions/{session_id}:
    parameters:
      - name: session_id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      operationId: getChatSession
      summary: Get session with full message history
      tags: [chat]
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionWithMessages"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      operationId: deleteChatSession
      summary: Delete session and all its messages
      tags: [chat]
      responses:
        "204":
          description: Session deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /chat/sessions/{session_id}/messages:
    post:
      operationId: sendMessage
      summary: Submit a user message — returns SSE stream
      tags: [chat]
      description: |
        Submits a user message to the LangGraph pipeline. Response is a Server-Sent Events (SSE) stream.

        ## SSE Event Types

        ### `token`
        Streamed as tokens are generated by the synthesizer node.
        ```json
        {"content": "word "}
        ```

        ### `citations`
        Sent once all content tokens have been emitted, if citations are available and enabled.
        ```json
        {"citations": [{"index": 1, "source": "HR Handbook", "document": "leave-policy.pdf", "excerpt": "Remote employees are entitled to..."}]}
        ```

        ### `clarification_needed`
        Sent when the query_router/clarifier node requires user input before proceeding.
        The stream closes after this event. The client should re-POST with `clarification_response`.
        ```json
        {"question": "Did you mean Q3 FY2025 EMEA revenue or Q3 FY2025 EMEA headcount?"}
        ```

        ### `guardrail_blocked`
        Sent when the input or output guardrail blocks the message or answer.
        ```json
        {"reason": "This response was blocked by company policy."}
        ```

        ### `sync_conflict`
        Sent when a queried source is currently syncing (FR-032). Client must present the 3-way choice UI.
        ```json
        {"source_id": "uuid", "source_name": "Q3 Sales DB", "sync_progress_percent": 45}
        ```

        ### `done`
        Final event; always sent unless an error closes the stream.
        ```json
        {"message_id": "uuid", "usage": {"prompt_tokens": 312, "completion_tokens": 128}}
        ```
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string
                description: "Server-Sent Events stream. See endpoint description for event types."
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Session:
      type: object
      required: [id, user_id, created_at]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    SessionList:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Session"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    SessionWithMessages:
      allOf:
        - $ref: "#/components/schemas/Session"
        - type: object
          properties:
            messages:
              type: array
              items:
                $ref: "#/components/schemas/Message"

    Message:
      type: object
      required: [id, session_id, role, content, created_at]
      properties:
        id:
          type: string
          format: uuid
        session_id:
          type: string
          format: uuid
        role:
          type: string
          enum: [user, assistant, clarification]
        content:
          type: string
        citations:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/Citation"
        guardrail_blocked:
          type: boolean
        created_at:
          type: string
          format: date-time

    Citation:
      type: object
      required: [index, source, document, excerpt]
      properties:
        index:
          type: integer
          description: "Corresponds to [N] marker in content"
        source:
          type: string
          description: Source display name (never internal connection details per FR-020)
        document:
          type: string
          description: Document name or table name
        excerpt:
          type: string
          description: Relevant text excerpt from the source

    SendMessageRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          description: User message text
          minLength: 1
          maxLength: 4000
        clarification_response:
          type: boolean
          default: false
          description: "Set to true when this message is a response to a clarification_needed event"
        sync_conflict_choice:
          type: string
          nullable: true
          enum: [use_last_synced, wait_and_rerun, cancel]
          description: "FR-032: User's choice when a source sync was in progress"

    Problem:
      type: object
      required: [type, title, status, detail]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        request_id:
          type: string

  responses:
    NotFound:
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
    ValidationError:
      description: Request validation failed
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/Problem"
