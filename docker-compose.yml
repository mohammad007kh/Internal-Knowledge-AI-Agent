services:
  frontend:
    build:
      context: ./frontend
      args:
        # Next.js inlines NEXT_PUBLIC_* at build time. Pass the host-aware
        # value through build args so changing HOST_BACKEND_PORT only
        # requires `docker compose build frontend` (no runtime env needed).
        NEXT_PUBLIC_API_URL: "http://localhost:${HOST_BACKEND_PORT:-8000}"
        # MinIO presigned upload URLs are issued by the backend at this host
        # so the frontend's upload-trust allowlist must include it. Shifting
        # HOST_MINIO_API_PORT also requires `docker compose build frontend`.
        NEXT_PUBLIC_MINIO_PUBLIC_URL: "http://localhost:${HOST_MINIO_API_PORT:-9000}"
    ports:
      - "${HOST_FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: on-failure

  backend:
    build: ./backend
    ports:
      - "${HOST_BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: backend/.env
    environment:
      # Override .env so presigned URLs always track HOST_MINIO_API_PORT.
      # Otherwise users who shift the host port would see broken downloads
      # because MINIO_PUBLIC_ENDPOINT in .env stays at localhost:9000.
      MINIO_PUBLIC_ENDPOINT: "localhost:${HOST_MINIO_API_PORT:-9000}"
      # CORS allow-origin must track HOST_FRONTEND_PORT — otherwise the
      # browser blocks all credentialed requests from a shifted frontend.
      FRONTEND_URL: "http://localhost:${HOST_FRONTEND_PORT:-3000}"
    command: sh -c "alembic upgrade head && exec uvicorn src.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - ./app_config.yaml:/app/app_config.yaml:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: on-failure

  worker:
    build: ./backend
    command: >
      celery -A src.tasks:celery_app worker
      --loglevel=info
      --concurrency=${CELERY_WORKER_CONCURRENCY:-4}
      --queues=default
    environment:
      CELERY_WORKER_CONCURRENCY: ${CELERY_WORKER_CONCURRENCY:-4}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: backend/.env
    volumes:
      - ./app_config.yaml:/app/app_config.yaml:ro
    healthcheck:
      test: ["CMD-SHELL", "celery -A src.tasks:celery_app inspect ping -d celery@$$HOSTNAME | grep -q pong"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  beat:
    build: ./backend
    command: >
      celery -A src.tasks:celery_app beat
      --loglevel=info
      --scheduler=celery.beat:PersistentScheduler
      --schedule=/tmp/celerybeat-schedule
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      worker:
        condition: service_started
    env_file: backend/.env
    volumes:
      - ./app_config.yaml:/app/app_config.yaml:ro
    # FR-033 — MUST be exactly 1 replica; duplicate beat = double-scheduling hazard
    deploy:
      mode: replicated
      replicas: 1
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg16
    ports:
      - "${HOST_DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: knowledge_agent
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: on-failure

  redis:
    image: redis:7-alpine
    ports:
      - "${HOST_REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: on-failure

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "${HOST_MINIO_API_PORT:-9000}:9000"
      - "${HOST_MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: on-failure

  langfuse:
    image: langfuse/langfuse:2
    ports:
      - "${HOST_LANGFUSE_PORT:-3001}:3000"
    depends_on:
      langfuse-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      NEXTAUTH_SECRET: ${LANGFUSE_SECRET_KEY}
      NEXTAUTH_URL: http://localhost:${HOST_LANGFUSE_PORT:-3001}
    restart: on-failure

  langfuse-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: langfuse
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
    volumes:
      - langfuse_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: on-failure

volumes:
  db_data:
  redis_data:
  minio_data:
  langfuse_db_data:

networks:
  default:
    name: knowledge_agent_network
