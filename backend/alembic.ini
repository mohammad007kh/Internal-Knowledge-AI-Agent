# Alembic configuration file.
# DATABASE_URL is injected at runtime by alembic/env.py from the environment.
# Do NOT hard-code credentials here.

[alembic]
# Path to the Alembic migration environment directory.
script_location = alembic

# Timestamp-based file naming so migrations sort chronologically.
file_template = %%(year)d%%(month)02d%%(day)02d_%%(hour)02d%%(minute)02d_%%(rev)s_%%(slug)s

# Prepend backend/src to sys.path so model imports resolve without install.
prepend_sys_path = .

# Platform-independent path separator for version paths.
version_path_separator = os

# Overridden at runtime in env.py from os.environ["DATABASE_URL"].
sqlalchemy.url = ${DATABASE_URL}

# ─── Logging ────────────────────────────────────────────────────────────────
[post_write_hooks]
# (no post-write hooks configured)

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
